
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestione Turni</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh}

.topbar{background:#1e293b;color:white;padding:10px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.topbar h1{font-size:1.1rem;font-weight:700;margin-right:auto}
.week-nav{display:flex;align-items:center;gap:6px}
.week-nav button{background:#334155;color:white;border:none;padding:5px 10px;border-radius:6px;cursor:pointer;font-size:.85rem}
.week-nav button:hover{background:#475569}
.week-label{font-size:.85rem;white-space:nowrap;min-width:185px;text-align:center}
.tab-btns{display:flex;gap:4px}
.tab-btn{background:#334155;color:#94a3b8;border:none;padding:5px 12px;border-radius:6px;cursor:pointer;font-size:.82rem}
.tab-btn.active{background:#3b82f6;color:white}
.action-btns{display:flex;gap:6px}
.btn{padding:5px 12px;border-radius:6px;border:none;cursor:pointer;font-size:.82rem;font-weight:500}
.btn-primary{background:#3b82f6;color:white}
.btn-secondary{background:#475569;color:white}
.btn-danger{background:#ef4444;color:white}
.btn-success{background:#22c55e;color:white}
.btn-export{background:#8b5cf6;color:white}
.btn:hover{opacity:.85}

.strip{background:white;border-bottom:1px solid #e2e8f0;padding:8px 14px;display:flex;align-items:center;gap:7px;overflow-x:auto;min-height:46px;flex-wrap:wrap}
.strip-label{font-size:.72rem;color:#64748b;white-space:nowrap;font-weight:700;text-transform:uppercase;letter-spacing:.05em;flex-shrink:0}
.pill{padding:5px 13px;border-radius:20px;font-size:.78rem;font-weight:700;cursor:grab;user-select:none;white-space:nowrap;color:white;text-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .1s,box-shadow .1s;flex-shrink:0}
.pill:hover{transform:translateY(-2px);box-shadow:0 4px 10px rgba(0,0,0,.15)}
.pill:active{cursor:grabbing}
.strip-sep{width:1px;height:26px;background:#e2e8f0;margin:0 2px;flex-shrink:0}
.strip-hint{font-size:.7rem;color:#94a3b8;margin-left:auto;flex-shrink:0;white-space:nowrap}

.grid-wrap{padding:10px;overflow-x:auto}
/* Colonna nome auto-sizing: table-layout:auto + white-space:nowrap sulla prima colonna */
.grid{border-collapse:collapse;width:100%;min-width:700px;background:white;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;table-layout:auto}
.grid th{background:#f8fafc;padding:5px 3px;text-align:center;font-size:.75rem;font-weight:700;color:#475569;border:1px solid #e2e8f0}
.grid th:first-child{text-align:left;padding-left:8px;white-space:nowrap;position:sticky;left:0;z-index:2;background:#f8fafc}
.grid td{padding:0;border:1px solid #e2e8f0;vertical-align:top;height:48px}
.grid td:first-child{padding:3px 8px;font-size:.82rem;font-weight:600;position:sticky;left:0;background:white;z-index:1;display:flex;flex-direction:column;justify-content:center;white-space:nowrap}
.grid tr:hover td{background:#f8fafc}
.grid tr:hover td:first-child{background:#f8fafc}

.cell{height:100%;width:100%;padding:2px;transition:background .12s;cursor:pointer;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px;overflow:hidden}
.cell.drag-over{background:#dbeafe!important;outline:2px dashed #3b82f6;outline-offset:-2px}

.cell-chip{
  padding:2px 4px;
  border-radius:5px;
  font-size:.76rem;
  font-weight:700;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  line-height:1.15;
  width:98%;
  height:94%;
  border:2px solid currentColor;
  text-align:center;
  color:#000!important;
  cursor:grab;
  user-select:none;
  transition:opacity .15s, transform .1s;
}
.cell-chip:hover{transform:scale(1.03)}
.cell-chip:active{cursor:grabbing;opacity:.7}
.cell-chip.is-dragging{opacity:.35;transform:scale(.97)}

.chip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;font-size:.78rem;display:flex;align-items:center;justify-content:center;gap:3px}
.chip-time{font-size:.64rem;opacity:.9;font-weight:600;margin-top:1px}

.conflict-dot{width:6px;height:6px;border-radius:50%;background:#f59e0b;display:inline-block;flex-shrink:0}

/* Pallino rosso lampeggiante per turni modificati manualmente */
@keyframes blink-modified{0%,100%{opacity:1}50%{opacity:0}}
.modified-dot{
  width:7px;height:7px;border-radius:50%;
  background:#ef4444;
  display:inline-block;
  flex-shrink:0;
  animation:blink-modified 1s ease-in-out infinite;
}

.day-today{background:#eff6ff}
.th-today{background:#3b82f6!important;color:white!important;border-color:#2563eb!important}
.role-badge{font-size:.62rem;color:#94a3b8;font-weight:400;margin-top:1px}

/* ── PDF overlay a finestra centrata ── */
.pdf-overlay{
  position:fixed;inset:0;background:rgba(15,23,42,.65);
  z-index:2000;display:flex;align-items:center;justify-content:center;padding:24px;
}
.pdf-window{
  background:white;border-radius:14px;overflow:hidden;
  width:min(96vw,1100px);height:min(92vh,780px);
  display:flex;flex-direction:column;
  box-shadow:0 24px 80px rgba(0,0,0,.45);
}
.pdf-toolbar{background:#1e293b;padding:10px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0;border-bottom:1px solid #334155}
.pdf-toolbar h2{color:white;font-size:.88rem;margin-right:auto;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tbtn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.8rem;font-weight:600;white-space:nowrap}
.tbtn-print{background:#3b82f6;color:white}
.tbtn-save{background:#22c55e;color:white}
.tbtn-close{background:#475569;color:white}
.tbtn:hover{opacity:.85}
.pdf-frame-wrap{flex:1;overflow:hidden;display:flex;align-items:stretch}
.pdf-frame-wrap iframe{width:100%;height:100%;border:none}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px}
.modal{background:white;border-radius:14px;padding:22px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal h2{font-size:1.05rem;font-weight:700;margin-bottom:14px}
.modal-footer{display:flex;justify-content:flex-end;gap:7px;margin-top:18px;flex-wrap:wrap}

.form-row{margin-bottom:12px}
.form-row label{display:block;font-size:.78rem;font-weight:700;color:#475569;margin-bottom:4px}
.form-row input[type=text],.form-row input[type=time],.form-row select{width:100%;padding:7px 10px;border:1px solid #e2e8f0;border-radius:7px;font-size:.88rem;outline:none;font-family:inherit}
.form-row input:focus,.form-row select:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.1)}
.toggle-group{display:flex;flex-wrap:wrap;gap:5px}
.tog{padding:4px 9px;border-radius:20px;font-size:.76rem;font-weight:600;border:2px solid #e2e8f0;background:white;color:#64748b;cursor:pointer;transition:all .12s}
.tog.on{border-color:#3b82f6;background:#3b82f6;color:white}

.staff-list,.prog-list{border:1px solid #e2e8f0;border-radius:8px;overflow:hidden}
.staff-list{max-height:220px;overflow-y:auto}
.prog-list{max-height:250px;overflow-y:auto;margin-bottom:10px}
.list-item{display:flex;align-items:center;gap:8px;padding:7px 12px;border-bottom:1px solid #f1f5f9;font-size:.83rem}
.list-item:last-child{border-bottom:none}
.list-item .info{flex:1}
.list-item .meta{font-size:.72rem;color:#64748b}
.list-item .del{background:none;border:none;color:#cbd5e1;cursor:pointer;font-size:.88rem;padding:2px 5px}
.list-item .del:hover{color:#ef4444}
.dot12{width:12px;height:12px;border-radius:50%;flex-shrink:0}

.empty-state{text-align:center;padding:40px 20px;color:#94a3b8;font-size:.88rem}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:3px}

/* Color swatches per nota */
.color-swatches{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}
.cswatch{width:24px;height:24px;border-radius:5px;cursor:pointer;border:3px solid transparent;transition:transform .12s,border-color .12s;flex-shrink:0}
.cswatch:hover{transform:scale(1.18)}
.cswatch.sel{border-color:#1e293b;transform:scale(1.18)}

/* PDF print area (nascosto, usato per cattura) */
#pdf-capture{display:none}
#pdf-header{display:none;margin-bottom:16px;text-align:center}
#pdf-header h2{font-size:20px;margin-bottom:3px;color:#1e293b}
#pdf-header p{font-size:13px;color:#64748b}
</style>
</head>
<body>
<div id="app"></div>
<div id="pdf-ui" style="display:none">
  <div class="pdf-overlay" id="pdf-overlay" onclick="if(event.target===this)closePdfOverlay()">
    <div class="pdf-window">
      <div class="pdf-toolbar">
        <h2 id="pdf-title">📄 Anteprima PDF</h2>
        <button class="tbtn tbtn-print" id="pdf-print-btn">🖨️ Stampa</button>
        <button class="tbtn tbtn-save" id="pdf-save-btn">⬇️ Scarica PDF</button>
        <button class="tbtn tbtn-close" onclick="closePdfOverlay()">✕ Chiudi</button>
      </div>
      <div class="pdf-frame-wrap">
        <iframe id="pdf-iframe" src=""></iframe>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
const firebaseConfig = {
  apiKey: "AIzaSyD8RyTJgSj5U8DA-T7nPzRIzfYqfzoRhn8",
  authDomain: "turnazione-2722d.firebaseapp.com",
  projectId: "turnazione-2722d",
  storageBucket: "turnazione-2722d.firebasestorage.app",
  messagingSenderId: "940298778130",
  appId: "1:940298778130:web:923caafd0596e861984acb",
  measurementId: "G-6G952ZHRP3"
};
window._fbReady = new Promise(resolve => {
  try {
    const fbApp = initializeApp(firebaseConfig);
    const db = getFirestore(fbApp);
    const DB_DOC = doc(db, 'app', 'data');
    window._fbSave = async (data) => { await setDoc(DB_DOC, data); };
    window._fbLoad = async () => { const snap = await getDoc(DB_DOC); return snap.exists() ? snap.data() : null; };
  } catch(e) { console.error('Firebase init error:', e); }
  resolve();
});
</script>
<script>
// ── CONSTANTS ──
const BUILTINS=[
  {id:'riposo',     nome:'Assente',           colore:'#ef4444',oraInizio:'',     oraFine:''     },
  {id:'mattina',    nome:'Turno Mattina',     colore:'#94a3b8',oraInizio:'09:00',oraFine:'14:00'},
  {id:'intermezzo', nome:'Turno Intermezzo',  colore:'#0ea5e9',oraInizio:'13:00',oraFine:'20:00'},
  {id:'pomeriggio', nome:'Turno Pomeriggio',  colore:'#94a3b8',oraInizio:'15:30',oraFine:'20:30'},
  {id:'intero',     nome:'Turno Intero',      colore:'#475569',oraInizio:'09:00',oraFine:'20:00'},
  {id:'trasferta',  nome:'Trasferta',         colore:'#b45309',oraInizio:'',     oraFine:''     },
];
const GN=['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];
const GF=['Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato','Domenica'];
const MN=['Gen','Feb','Mar','Apr','Mag','Giu','Lug','Ago','Set','Ott','Nov','Dic'];
const BUILTIN_IDS=new Set(BUILTINS.map(b=>b.id));

// Palette colori nota singola
const NOTE_COLORS=['#6366f1','#8b5cf6','#ec4899','#ef4444','#f97316','#f59e0b','#22c55e','#10b981','#06b6d4','#3b82f6','#64748b','#b45309','#be185d','#0369a1','#1e293b'];

// ── STATE ──
const S={
  cat:'tecnici', weekStart:null,
  staff:[], programmi:[], turni:{},
  modalStaff:false, modalProg:false, editProg:null,
  cellModal:null, removePrompt:null,
  dragging:null,
  noteColor:'#6366f1',
  _pdfUrl:null,
};

// ── PERSISTENCE ──
async function save(){
  try{ if(window._fbSave) await window._fbSave({staff:S.staff,programmi:S.programmi,turni:S.turni}); }catch(e){console.error('save:',e);}
  try{ localStorage.setItem('turni_v5_fb',JSON.stringify({staff:S.staff,programmi:S.programmi,turni:S.turni})); }catch{}
}
async function load(){
  try{
    if(window._fbLoad){ const d=await window._fbLoad(); if(d){S.staff=d.staff||[];S.programmi=d.programmi||[];S.turni=d.turni||{};return;} }
  }catch(e){console.error('load:',e);}
  try{ const d=JSON.parse(localStorage.getItem('turni_v5')||localStorage.getItem('turni_v5_fb')||'{}');S.staff=d.staff||[];S.programmi=d.programmi||[];S.turni=d.turni||{}; }catch{S.staff=[];S.programmi=[];S.turni={};}
}

// ── DATE UTILS ──
function toISO(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fromISO(s){const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d)}
function addDays(iso,n){const d=fromISO(iso);d.setDate(d.getDate()+n);return toISO(d)}
function getMonday(iso){const d=fromISO(iso),day=d.getDay(),diff=day===0?-6:1-day;d.setDate(d.getDate()+diff);return toISO(d)}
function getDow(iso){const day=fromISO(iso).getDay();return day===0?6:day-1}
function getMonth(iso){return fromISO(iso).getMonth()}
function fmtDate(iso){const d=fromISO(iso);return`${d.getDate()}/${d.getMonth()+1}`}
function isToday(iso){return iso===toISO(new Date())}
function isPast(iso){return iso<toISO(new Date())}
function weekOffset(iso,baseISO){const d=fromISO(getMonday(iso)),b=fromISO(getMonday(baseISO));return Math.round((d-b)/(7*86400*1000))}
function weekDates(){return Array.from({length:7},(_,i)=>addDays(S.weekStart,i))}
function fmtWeekLabel(){const dd=weekDates(),s=fromISO(dd[0]),e=fromISO(dd[6]);return`${s.getDate()} ${MN[s.getMonth()]} – ${e.getDate()} ${MN[e.getMonth()]} ${e.getFullYear()}`}
function easter(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),dy=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,dy)}
function isHoliday(iso){const d=fromISO(iso),y=d.getFullYear();const md=`${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;if(['01-01','01-06','04-25','05-01','06-02','08-15','11-01','12-08','12-25','12-26'].includes(md))return true;const ea=easter(y),em=new Date(ea);em.setDate(em.getDate()+1);return toISO(ea)===iso||toISO(em)===iso}

// ── DATA HELPERS ──
function uid(){return Math.random().toString(36).slice(2,10)}
function byId(arr,id){return arr.find(x=>x.id===id)}
function staffSorted(cat){return S.staff.filter(s=>s.cat===cat).sort((a,b)=>a.cognome.localeCompare(b.cognome)||a.nome.localeCompare(b.nome))}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hexToRgba(hex,alpha){if(!hex||hex.length<7)return`rgba(0,0,0,${alpha})`;let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);return`rgba(${r},${g},${b},${alpha})`}

// ── SHIFT LOGIC ──
function getAuto(pid,iso){
  const dow=getDow(iso),mon=getMonth(iso);
  const person=byId(S.staff,pid);if(!person)return null;
  for(const pg of S.programmi){
    if(!pg.giorni||!pg.giorni.includes(dow))continue;
    if(pg.mesi&&pg.mesi.length&&!pg.mesi.includes(mon))continue;
    if(pg.turnazione){
      const roleRot=(pg.rotazioni&&pg.rotazioni[person.ruolo])||(pg.rotazione?pg.rotazione:[]);
      if(!roleRot.length)continue;
      const di=pg.giorni.indexOf(dow),wo=weekOffset(iso,pg.baseDate||iso),len=roleRot.length;
      if(roleRot[((di+wo)%len+len)%len]===pid) return{eventoId:pg.id,oraInizio:pg.oraInizio,oraFine:pg.oraFine,oraInizio2:pg.oraInizio2,oraFine2:pg.oraFine2};
    }else{
      if(((pg.fissi||{})[dow]||[]).includes(pid)) return{eventoId:pg.id,oraInizio:pg.oraInizio,oraFine:pg.oraFine,oraInizio2:pg.oraInizio2,oraFine2:pg.oraFine2};
    }
  }
  return null;
}
function getManual(pid,iso){return S.turni[`${pid}|${iso}|${S.cat}`]??null}
function getShift(pid,iso){const m=getManual(pid,iso);if(m!==null)return m.blocked?null:m;return getAuto(pid,iso)}
function setManual(pid,iso,val){const k=`${pid}|${iso}|${S.cat}`;if(val===null)delete S.turni[k];else S.turni[k]=val;save().catch(e=>console.error(e))}
function conflictCheck(pid,iso){
  const cur=getShift(pid,iso);if(!cur?.eventoId||BUILTIN_IDS.has(cur.eventoId))return null;
  const pg=byId(S.programmi,cur.eventoId);if(!pg||!pg.nome)return null;
  if(pg.nome.toLowerCase().includes('prima mattina')){
    const dow=getDow(iso);if(dow===0){const prev=getShift(pid,addDays(iso,-7));if(prev?.eventoId===cur.eventoId)return pg.nome;}
  }
  return null;
}

// ── DROP (strip pill → cella, oppure cella → cella) ──
function dropOnCell(pid,iso){
  if(!S.dragging)return;
  const{type,id,cellShift}=S.dragging;
  const dow=getDow(iso);
  const person=byId(S.staff,pid);if(!person)return;
  try{
    if(type==='cell'){
      // Copia diretta del turno nella cella destinazione come manuale
      if(cellShift) setManual(pid,iso,{...cellShift,manual:true});
      save().catch(e=>console.error(e));
      render();return;
    }
    if(type==='builtin'){
      setManual(pid,iso,null);
      const bi=BUILTINS.find(b=>b.id===id);if(!bi)return;
      if(['mattina','pomeriggio','intermezzo','intero'].includes(bi.id)){
        let pg=S.programmi.find(p=>p.nome===bi.nome&&!p.isRealProg);
        if(!pg){pg={id:uid(),nome:bi.nome,colore:bi.colore,oraInizio:bi.oraInizio,oraFine:bi.oraFine,giorni:[0,1,2,3,4,5,6],mesi:[],turnazione:false,fissi:{},isRealProg:false};S.programmi.push(pg);}
        if(!pg.fissi)pg.fissi={};
        if(!pg.fissi[dow])pg.fissi[dow]=[];
        if(!pg.fissi[dow].includes(pid))pg.fissi[dow].push(pid);
      }else{
        setManual(pid,iso,{eventoId:bi.id,oraInizio:bi.oraInizio,oraFine:bi.oraFine,nota:'',manual:true});
      }
    }else{
      const pg=byId(S.programmi,id);if(!pg)return;
      if(pg.nome&&pg.nome.toLowerCase().includes('prima mattina')){
        setManual(pid,iso,{eventoId:pg.id,oraInizio:pg.oraInizio,oraFine:pg.oraFine,oraInizio2:pg.oraInizio2||'',oraFine2:pg.oraFine2||'',manual:true});
      }else{
        setManual(pid,iso,null);
        if(!pg.fissi)pg.fissi={};
        if(!pg.fissi[dow])pg.fissi[dow]=[];
        if(!pg.fissi[dow].includes(pid))pg.fissi[dow].push(pid);
        if(!pg.giorni)pg.giorni=[];
        if(!pg.giorni.includes(dow)){pg.giorni.push(dow);pg.giorni.sort((a,b)=>a-b);}
      }
    }
    save().catch(e=>console.error(e));render();
  }catch(e){console.error(e);alert('Errore nel trascinamento: '+e.message);}
}

// ── RENDER ──
function render(){
  document.getElementById('app').innerHTML=buildHTML();
  bindDrag();
}

function buildHTML(){
  return topBar()+strip()+gridSection()+
    (S.modalStaff?modalStaff():'')+
    (S.modalProg?modalProg():'')+
    (S.cellModal?cellModal():'')+
    (S.removePrompt?removePrompt():'');
}

function topBar(){
  return`<div class="topbar">
  <h1>📺 Gestione Turni</h1>
  <div class="week-nav">
    <button onclick="prevWeek()">‹</button>
    <span class="week-label">${fmtWeekLabel()}</span>
    <button onclick="nextWeek()">›</button>
    <button onclick="goToday()" style="font-size:.72rem;padding:3px 7px">Oggi</button>
  </div>
  <div class="tab-btns">
    <button class="tab-btn ${S.cat==='tecnici'?'active':''}" onclick="setTab('tecnici')">Tecnici</button>

function gridSection(){
  const list=staffSorted(S.cat);
  const dates=weekDates();
  if(!list.length)return`<div class="empty-state">Nessun personale in questa categoria.</div>`;
  const headers=dates.map((d,i)=>{
    const tc=isToday(d)?'th-today':'';
    const hol=isHoliday(d)?` <span style="color:${tc?'rgba(255,255,255,.7)':'#ef4444'}">✦</span>`:'';
    return`<th class="${tc}"><div>${GN[i]}</div><div style="font-size:.68rem;opacity:.8">${fmtDate(d)}${hol}</div></th>`;
  }).join('');
  const rows=list.map(s=>{
    const cells=dates.map(d=>buildCell(s.id,d)).join('');
    return`<tr><td><div style="font-weight:700;font-size:.82rem;white-space:nowrap">${esc(s.cognome)} ${esc(s.nome)}</div><div class="role-badge">${esc(s.ruolo)}</div></td>${cells}</tr>`;
  }).join('');
  return`<div class="grid-wrap" id="capture-area">
    <div id="pdf-header">
      <h2>Programmazione Turni — ${S.cat.toUpperCase()}</h2>
      <p>Settimana dal ${fmtWeekLabel()}</p>
    </div>
    <table class="grid">
      <thead><tr><th>Nome</th>${headers}</tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function buildCell(pid,iso){
  const sh=getShift(pid,iso);
  const today=isToday(iso)?' day-today':'';

  // Pallino rosso: turno modificato manualmente rispetto all'automatico, visibile fino a fine giornata
  const manualEntry=getManual(pid,iso);
  const autoEntry=getAuto(pid,iso);
  const isModified=manualEntry!==null&&!manualEntry?.blocked&&autoEntry!==null&&!isPast(iso);

  let inner='';
  if(sh){
    const bi=BUILTINS.find(b=>b.id===sh.eventoId);
    const pg=!bi?byId(S.programmi,sh.eventoId):null;
    const isImpro=sh&&!sh.eventoId;
    const col=isImpro?(sh.coloreNota||'#6366f1'):(bi?.colore||pg?.colore||'#6366f1');
    const nom=bi?.nome||pg?.nome||sh.nomeImprovvisato||'?';
    let t='';
    if(sh.oraInizio&&sh.oraFine){t=`${sh.oraInizio}–${sh.oraFine}`;if(sh.oraInizio2&&sh.oraFine2)t+=` / ${sh.oraInizio2}–${sh.oraFine2}`;}
    const cfl=conflictCheck(pid,iso);
    const bgCol=isImpro?hexToRgba(col,.15):hexToRgba(col,.12);
    const borderCol=col;
    const shiftEnc=encodeURIComponent(JSON.stringify(sh));
    inner=`<div class="cell-chip"
      style="border-color:${borderCol};background-color:${bgCol}"
      draggable="true"
      data-cpid="${pid}" data-ciso="${iso}" data-cshift="${shiftEnc}"
    ><div class="chip-name"><span style="overflow:hidden;text-overflow:ellipsis">${esc(nom)}</span>${cfl?`<span class="conflict-dot" title="Conflitto"></span>`:''}${isModified?`<span class="modified-dot" title="Turno modificato manualmente"></span>`:''}</div>${t?`<div class="chip-time">${t}</div>`:''}</div>`;
  }
  return`<td><div class="cell${today}"
    ondragover="event.preventDefault();this.classList.add('drag-over')"
    ondragleave="this.classList.remove('drag-over')"
    ondrop="this.classList.remove('drag-over');dropOnCell('${pid}','${iso}')"
    onclick="onCellClick(event,'${pid}','${iso}')"
  >${inner}</div></td>`;
}

// click sulla cella: ignora se appena finito un drag
window._wasDragging=false;
function onCellClick(e,pid,iso){
  if(window._wasDragging){window._wasDragging=false;return;}
  openCell(pid,iso);
}

function addStaff(){
  const nome=(document.getElementById('s-nome').value||'').trim(),cognome=(document.getElementById('s-cognome').value||'').trim();
  if(!nome||!cognome){alert('Inserisci nome e cognome');return}

function removeStaff(id){
  if(!confirm('Rimuovere questa persona?'))return;
  S.staff=S.staff.filter(s=>s.id!==id);
  S.programmi.forEach(pg=>{
    if(pg.rotazioni)Object.values(pg.rotazioni).forEach(arr=>{const ix=arr.indexOf(id);if(ix>=0)arr.splice(ix,1)});
    if(pg.rotazione)pg.rotazione=pg.rotazione.filter(p=>p!==id);
    if(pg.fissi)Object.keys(pg.fissi).forEach(d=>{pg.fissi[d]=(pg.fissi[d]||[]).filter(p=>p!==id)});
  });
  save().catch(e=>console.error(e));render();
}

  if(!S.editProg||typeof S.editProg!=='object')return;
  const f=id=>document.getElementById(id);
  if(f('pg-nome'))S.editProg.nome=f('pg-nome').value;

  if(f('pg-fin'))S.editProg.oraFine=f('pg-fin').value;

  readProgForm();

  if(!S.editProg.giorni.length){alert('Seleziona almeno un giorno');return}
  const ix=S.programmi.findIndex(p=>p.id===S.editProg.id);
  if(ix>=0)S.programmi[ix]=S.editProg;else S.programmi.push(S.editProg);

function saveImpro(pid,date){

  const ini=document.getElementById('im-ini').value;
  const fin=document.getElementById('im-fin').value;
  const ini2=document.getElementById('im-ini2').value;
  const fin2=document.getElementById('im-fin2').value;
  const coloreNota=S.noteColor||'#6366f1';
  if(!nome&&!ini){alert('Inserisci almeno un nome o un orario');return;}
  setManual(pid,date,{nomeImprovvisato:nome,oraInizio:ini,oraFine:fin,oraInizio2:ini2,oraFine2:fin2,coloreNota,manual:true});
  S.cellModal=null;render();

function clearCellPrompt(pid,date){
  const sh=getShift(pid,date);
  if(sh&&sh.eventoId&&!BUILTIN_IDS.has(sh.eventoId)){
    const pg=byId(S.programmi,sh.eventoId);
    if(pg){S.cellModal=null;S.removePrompt={pid,date,progName:pg.nome};render();}
  }else{
    if(getAuto(pid,date))setManual(pid,date,{blocked:true});
    else setManual(pid,date,null);
    S.cellModal=null;render();
  }
}

function confirmRemove(type){
  const{pid,date}=S.removePrompt;
  const sh=getShift(pid,date);
  const pg=byId(S.programmi,sh.eventoId);
  const person=byId(S.staff,pid);
  if(type==='day'){
    setManual(pid,date,{blocked:true});
  }else{
    if(pg.turnazione){
      if(pg.rotazioni&&person&&pg.rotazioni[person.ruolo])pg.rotazioni[person.ruolo]=pg.rotazioni[person.ruolo].filter(id=>id!==pid);
      if(pg.rotazione)pg.rotazione=pg.rotazione.filter(id=>id!==pid);
    }else{
      const dow=getDow(date);
      if(pg.fissi&&pg.fissi[dow])pg.fissi[dow]=pg.fissi[dow].filter(id=>id!==pid);
    }
    setManual(pid,date,null);save().catch(e=>console.error(e));
  }
  S.removePrompt=null;render();
}

async function exportPDF(){
  const{jsPDF}=window.jspdf;
  const list=staffSorted(S.cat);
  const dates=weekDates();

  // A4 landscape in mm: 297 × 210
  const pdf=new jsPDF('l','mm','a4');
  const PW=297, PH=210;
  const ML=8, MR=8, MT=18, MB=6;
  const usableW=PW-ML-MR;
  const usableH=PH-MT-MB;

  pdf.setFont('helvetica','bold');
  pdf.setFontSize(13);
  pdf.setTextColor(30,41,59);
  pdf.text(`Programmazione Turni — ${S.cat.toUpperCase()}`,PW/2,10,{align:'center'});
  pdf.setFont('helvetica','normal');
  pdf.setFontSize(8);
  pdf.setTextColor(100,116,139);
  pdf.text(`Settimana dal ${fmtWeekLabel()}`,PW/2,15,{align:'center'});

  // Calcola larghezza colonna nome in base al nome più lungo
  const maxNameLen=list.reduce((m,s)=>Math.max(m,`${s.cognome} ${s.nome}`.length),0);
  const nameColW=Math.min(55,Math.max(28,maxNameLen*1.9));

  const dayColW=(usableW-nameColW)/7;
  const headerH=9;
  const nRows=list.length;
  const rowH=Math.min(22, Math.max(10, (usableH-headerH)/nRows));

  const hdrY=MT;
  pdf.setFillColor(241,245,249);
  pdf.setDrawColor(203,213,225);
  pdf.rect(ML, hdrY, nameColW, headerH, 'FD');
  pdf.setFont('helvetica','bold');
  pdf.setFontSize(7.5);
  pdf.setTextColor(71,85,105);
  pdf.text('Nome', ML+2, hdrY+6);

  dates.forEach((d,i)=>{
    const x=ML+nameColW+i*dayColW;
    const isTod=isToday(d), isHol=isHoliday(d);
    if(isTod){ pdf.setFillColor(59,130,246); pdf.setDrawColor(37,99,235); }
    else      { pdf.setFillColor(241,245,249); pdf.setDrawColor(203,213,225); }
    pdf.rect(x, hdrY, dayColW, headerH, 'FD');
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(8);
    pdf.setTextColor(isTod?255:71, isTod?255:85, isTod?255:105);
    pdf.text(GN[i]+(isHol?' ✦':''), x+dayColW/2, hdrY+4, {align:'center'});
    pdf.setFontSize(6.5);
    pdf.text(fmtDate(d), x+dayColW/2, hdrY+7.5, {align:'center'});
  });

  pdf.setDrawColor(203,213,225);
  list.forEach((s,ri)=>{
    const rowY=hdrY+headerH+ri*rowH;
    const bg=ri%2===0?[255,255,255]:[250,250,250];

    pdf.setFillColor(...bg);
    pdf.setDrawColor(203,213,225);
    pdf.setLineWidth(0.1);
    pdf.rect(ML, rowY, nameColW, rowH, 'FD');
    pdf.setFont('helvetica','bold');
    pdf.setFontSize(6.5);
    pdf.setTextColor(30,41,59);
    const fullName=`${s.cognome} ${s.nome}`;
    const maxChars=Math.floor(nameColW/1.95);
    const nameStr=fullName.length>maxChars?fullName.slice(0,maxChars-1)+'…':fullName;
    pdf.text(nameStr, ML+1.5, rowY+rowH/2-1.5);
    pdf.setFont('helvetica','normal');
    pdf.setFontSize(5.5);
    pdf.setTextColor(148,163,184);
    pdf.text(s.ruolo, ML+1.5, rowY+rowH/2+2.5);

    dates.forEach((iso,i)=>{
      const x=ML+nameColW+i*dayColW;
      pdf.setFillColor(...bg);
      pdf.setDrawColor(203,213,225);
      pdf.setLineWidth(0.1);
      pdf.rect(x, rowY, dayColW, rowH, 'FD');

      const sh=getShift(s.id,iso);
      if(!sh) return;

      const bi=BUILTINS.find(b=>b.id===sh.eventoId);
      const pg=!bi?byId(S.programmi,sh.eventoId):null;
      const col=!sh.eventoId?(sh.coloreNota||'#6366f1'):(bi?.colore||pg?.colore||'#6366f1');
      const nom=bi?.nome||pg?.nome||sh.nomeImprovvisato||'?';
      let t='';
      if(sh.oraInizio&&sh.oraFine){ t=`${sh.oraInizio}–${sh.oraFine}`; if(sh.oraInizio2&&sh.oraFine2) t+=` / ${sh.oraInizio2}–${sh.oraFine2}`; }

      const hr=parseInt(col.slice(1,3),16),hg=parseInt(col.slice(3,5),16),hb=parseInt(col.slice(5,7),16);
      const pad=1.2;
      const lightR=Math.round(hr*0.15+240*0.85), lightG=Math.round(hg*0.15+245*0.85), lightB=Math.round(hb*0.15+249*0.85);
      pdf.setFillColor(lightR,lightG,lightB);
      pdf.setDrawColor(hr,hg,hb);
      pdf.setLineWidth(0.4);
      pdf.roundedRect(x+pad, rowY+pad, dayColW-pad*2, rowH-pad*2, 1, 1, 'FD');
      pdf.setLineWidth(0.1);

      pdf.setFont('helvetica','bold');
      pdf.setFontSize(6);
      pdf.setTextColor(30,41,59);
      const cx=x+dayColW/2;
      const maxC=Math.floor((dayColW-3)/1.85);
      const nomStr=nom.length>maxC?nom.slice(0,maxC-1)+'…':nom;
      if(t){
        pdf.text(nomStr, cx, rowY+rowH/2-1, {align:'center'});
        pdf.setFont('helvetica','normal');
        pdf.setFontSize(5.2);
        pdf.setTextColor(55,65,81);
        pdf.text(t, cx, rowY+rowH/2+2.8, {align:'center'});
      } else {
        pdf.text(nomStr, cx, rowY+rowH/2+1, {align:'center'});
      }

      // Pallino rosso fisso se il turno è stato modificato manualmente
      const manualPdf=getManual(s.id,iso);
      const autoPdf=getAuto(s.id,iso);
      if(manualPdf!==null&&!manualPdf?.blocked&&autoPdf!==null){
        const dotR=1.4;
        pdf.setFillColor(239,68,68);
        pdf.setDrawColor(239,68,68);
        pdf.circle(x+dayColW-pad-dotR-0.5, rowY+pad+dotR+0.5, dotR, 'F');
      }
    });
  });

  const blob=pdf.output('blob');
  if(S._pdfUrl)URL.revokeObjectURL(S._pdfUrl);
  S._pdfUrl=URL.createObjectURL(blob);

  const iframe=document.getElementById('pdf-iframe');
  document.getElementById('pdf-title').textContent=`📄 Turni – ${S.cat} – ${fmtWeekLabel()}`;
  document.getElementById('pdf-print-btn').onclick=()=>iframe.contentWindow&&iframe.contentWindow.print();
  document.getElementById('pdf-save-btn').onclick=()=>{const a=document.createElement('a');a.href=S._pdfUrl;a.download=`Turni_${S.cat}_${S.weekStart}.pdf`;a.click();};

  iframe.src=S._pdfUrl;
  document.getElementById('pdf-ui').style.display='block';
}

window.closePdfOverlay=function(){
  document.getElementById('pdf-ui').style.display='none';
};

// ── DRAG BINDING ──
function bindDrag(){
  document.querySelectorAll('.pill[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      S.dragging={type:e.currentTarget.dataset.dtype,id:e.currentTarget.dataset.did};
      e.dataTransfer.effectAllowed='copy';
    });
    el.addEventListener('dragend',()=>{S.dragging=null});
  });

  document.querySelectorAll('.cell-chip[draggable]').forEach(el=>{
    el.addEventListener('dragstart',e=>{
      e.stopPropagation();
      let cellShift=null;
      try{ cellShift=JSON.parse(decodeURIComponent(e.currentTarget.dataset.cshift||'')); }catch{}
      S.dragging={type:'cell',id:null,cellShift};
      e.currentTarget.classList.add('is-dragging');
      e.dataTransfer.effectAllowed='copy';
    });
    el.addEventListener('dragend',e=>{
      e.currentTarget.classList.remove('is-dragging');
      window._wasDragging=true;
      S.dragging=null;
      setTimeout(()=>{window._wasDragging=false;},150);
    });
  });
}

// ── INIT ──
(async()=>{
  S.weekStart=getMonday(toISO(new Date()));
  if(window._fbReady)await window._fbReady;
  else await new Promise(r=>setTimeout(r,300));
  await load();
  render();
})();
</script>
