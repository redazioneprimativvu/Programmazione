
<!DOCTYPE html>
<html lang="it"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Programmazione Cloud</title>
<style>
  :root {
    --bg: #fafaf8; --paper: #ffffff; --ink: #111111;
    --muted: #777777; --line: #e5e3dd; --accent: #111111;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: var(--bg); color: var(--ink); }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; font-size: 14px; line-height: 1.4; }
  .page { max-width: 900px; margin: 0 auto; padding: 0 20px 60px; }
  .sticky { position: -webkit-sticky; position: sticky; top: 0; z-index: 50; background: var(--bg); padding-top: 16px; padding-bottom: 8px; border-bottom: 1px solid var(--line); margin-bottom: 12px; }
  .top { display: flex; align-items: baseline; justify-content: space-between; border-bottom: 1px solid var(--ink); padding-bottom: 8px; margin-bottom: 10px; gap: 12px; flex-wrap: wrap; }
  .top h1 { margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.01em; }
  .top .month { font-size: 13px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .top .picker { display: flex; gap: 6px; margin-top: 6px; align-items: center; font-size: 12px; }
  .top .picker select { font: inherit; font-size: 12px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 3px; background: #fff; color: var(--ink); }
  .day.empty-day .day-h { opacity: 0.55; border-left-color: #aaa; background: #555; }
  .day .empty-msg { font-size: 11.5px; color: var(--muted); font-style: italic; padding: 2px 8px 4px; }
  .top .bar { display: flex; gap: 6px; flex-wrap: wrap; }
  .top .bar button { font: inherit; font-size: 12px; padding: 5px 10px; border: 1px solid var(--ink); background: transparent; color: var(--ink); cursor: pointer; border-radius: 3px; }
  .top .bar button:hover { background: var(--ink); color: var(--paper); }
  .top .bar button.danger { border-color: #999; color: #666; }
  .top .bar button.primary { background: var(--ink); color: var(--paper); }
  .form { display: grid; grid-template-columns: 130px 120px 85px 1fr 60px 60px auto; gap: 6px; padding: 8px; border: 1px dashed #bbb; border-radius: 4px 4px 0 0; border-bottom: none; background: var(--paper); align-items: center; }
  .recurrence { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; padding: 6px 8px 8px; border: 1px dashed #bbb; border-top: 1px dotted #ddd; border-radius: 0 0 4px 4px; background: var(--paper); font-size: 12px; color: var(--muted); margin-bottom: 6px; }
  .recurrence select { font: inherit; font-size: 12px; padding: 4px 6px; border: 1px solid #ccc; border-radius: 3px; background: #fff; color: var(--ink); }
  .recurrence .dow-toggles { display: flex; gap: 2px; }
  .recurrence .dow-toggles button { font: inherit; font-size: 11px; font-weight: 600; width: 30px; height: 26px; border: 1px solid #ccc; background: #fff; color: var(--muted); cursor: pointer; border-radius: 3px; padding: 0; }
  .recurrence .dow-toggles button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .recurrence .hint { font-style: italic; }
  .search-bar { font: inherit; font-size: 13px; padding: 6px 12px; border: 1.5px solid var(--ink); border-radius: 20px; background: #fff; color: var(--ink); width: 220px; box-shadow: 0 1px 4px rgba(0,0,0,.08); }
  .legend-row { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .cat-toggle-btn { font: inherit; font-size: 11px; font-weight: 600; padding: 5px 11px; border: 1px solid #bbb; border-radius: 3px; background: transparent; color: var(--muted); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .cat-panel { margin-top: 6px; padding: 8px 10px 10px; border: 1px solid #ddd; border-radius: 4px; background: var(--paper); font-size: 12px; margin-bottom: 4px; }
  .cat-panel h4 { margin: 0 0 8px; font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
  .cat-row { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; padding: 3px 5px; border: 1px solid #eee; border-radius: 3px; background: #fafafa; }
  .cat-color-pick { -webkit-appearance: none; width: 32px; height: 26px; border: 1px solid #ccc; background: none; cursor: pointer; padding: 2px; border-radius: 3px; }
  .cat-name-edit { flex: 1; font: inherit; font-size: 12px; padding: 3px 6px; border: 1px solid #ccc; border-radius: 3px; background: #fff; }
  .cat-del { font: inherit; font-size: 13px; font-weight: 600; border: none; background: transparent; cursor: pointer; padding: 2px 7px; color: var(--muted); border-radius: 2px; line-height: 1; }
  .cat-add { display: flex; gap: 6px; align-items: center; margin-top: 8px; padding-top: 8px; border-top: 1px dotted #ddd; }
  .cat-add input[type="color"] { -webkit-appearance: none; width: 32px; height: 26px; border: 1px solid #ccc; background: none; padding: 2px; cursor: pointer; border-radius: 3px; }
  .cat-add input[type="text"] { flex: 1; font: inherit; font-size: 12px; padding: 4px 7px; border: 1px solid #ccc; border-radius: 3px; }
  .cat-add button { font: inherit; font-size: 12px; font-weight: 600; padding: 5px 12px; background: var(--ink); color: var(--paper); border: none; border-radius: 3px; cursor: pointer; }
  .row.has-overlap { background: #fff8f0; }
  .overlap-badge { display: inline-block; background: #E65100; color: #fff; font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 2px; margin-left: 6px; vertical-align: middle; white-space: nowrap; }
  .grid-day { margin-bottom: 16px; }
  .grid-day-header { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 3px; }
  .grid-timeline { position: relative; height: 32px; background: #f0ede7; border-radius: 4px; overflow: hidden; }
  .grid-tick { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(0,0,0,0.12); }
  .grid-block { position: absolute; top: 2px; bottom: 2px; border-radius: 2px; overflow: hidden; cursor: default; min-width: 3px; display: flex; align-items: center; padding: 0 3px; font-size: 8.5px; font-weight: 600; white-space: nowrap; border: 1px solid rgba(0,0,0,0.18); }
  .grid-hours { display: flex; justify-content: space-between; font-size: 8.5px; color: #aaa; margin-top: 2px; padding: 0 0 2px; }
  .filter-row { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; margin-bottom: 4px; flex-wrap: wrap; gap: 6px; }
  .time-filter { display: flex; flex-wrap: wrap; gap: 3px; }
  .time-filter button, .view-toggle button { font: inherit; font-size: 11px; padding: 3px 8px; border: 1px solid #ccc; background: transparent; border-radius: 2px; cursor: pointer; color: var(--muted); }
  .time-filter button.on, .view-toggle button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .stats-panel { padding: 12px 14px 14px; border: 1px solid #e0ddd7; border-radius: 4px; background: var(--paper); margin-bottom: 8px; font-size: 12px; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 8px; margin: 8px 0 10px; }
  .stats-card { padding: 9px 11px; border: 1px solid #eee; border-radius: 4px; background: #fafaf8; }
  .stats-card .val { font-size: 21px; font-weight: 700; color: var(--ink); line-height: 1; font-variant-numeric: tabular-nums; }
  .stats-card .lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; margin-top: 4px; }
  .stats-cat-bar { display: flex; align-items: center; gap: 8px; margin-top: 5px; font-size: 11px; }
  .stats-bar-bg { flex: 1; height: 8px; background: #eee; border-radius: 4px; overflow: hidden; }
  .stats-bar-fill { height: 100%; border-radius: 4px; }
  .form select, .form input { font: inherit; font-size: 13px; padding: 5px 7px; border: 1px solid #ccc; border-radius: 3px; background: #fff; width: 100%; }
  .form .dur-wrap { display: contents; }
  .form .dur-box { position: relative; }
  .form .dur-box input { padding-right: 22px; text-align: center; }
  .form .dur-box .suffix { position: absolute; right: 6px; top: 50%; transform: translateY(-50%); font-size: 11px; color: var(--muted); pointer-events: none; }
  .form .go { font: inherit; font-size: 12px; font-weight: 600; padding: 6px 14px; background: var(--ink); color: var(--paper); border: none; border-radius: 3px; cursor: pointer; }
  .form .cancel { font: inherit; font-size: 12px; padding: 5px 8px; background: transparent; border: 1px solid #ccc; color: var(--muted); border-radius: 3px; cursor: pointer; }
  .filters { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; font-size: 11px; }
  .filters button { font: inherit; font-size: 11px; padding: 3px 8px; border: 1px solid #ccc; background: transparent; border-radius: 2px; cursor: pointer; color: var(--muted); }
  .filters button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .legend { display: flex; flex-wrap: wrap; gap: 10px 16px; font-size: 11px; padding: 6px 0 4px; margin-bottom: 10px; }
  .legend .it { display: inline-flex; align-items: center; gap: 6px; }
  .legend .sw { display: inline-block; width: 16px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.15); }
  .list { column-count: 1; }
  .day { break-inside: avoid; margin-bottom: 14px; }
  .day-h { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.1em; color: #fff; background: #111; padding: 6px 10px; border-left: 5px solid #d4a017; border-radius: 3px; margin: 14px 0 5px; }
  .row { display: grid; grid-template-columns: 18px 50px 1fr 60px 50px; gap: 8px; align-items: center; padding: 4px 8px; font-size: 12.5px; margin-bottom: 2px; border-radius: 3px; background: #ffffff; }
  .row .chip { width: 16px; height: 12px; border-radius: 2px; border: 1px solid rgba(0,0,0,0.2); }
  .row .t { font-weight: 600; }
  .row .n { overflow: hidden; text-overflow: ellipsis; display: flex; align-items: center; gap: 5px; }
  .row .d { font-size: 11.5px; color: var(--muted); text-align: right; }
  .row .act { display: flex; gap: 2px; justify-content: flex-end; }
  .row .act button { font: inherit; font-size: 12px; border: none; background: transparent; cursor: pointer; padding: 2px 6px; color: var(--muted); border-radius: 2px; }
  .row .act button.del:hover { background: #c62828; color: #fff; }
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-style: italic; }
  .recent-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #e53935; flex-shrink: 0; box-shadow: 0 0 0 2px rgba(229,57,53,.25); animation: pulse-dot 2s ease-in-out infinite; cursor: default; }
  @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 2px rgba(229,57,53,.25); } 50% { box-shadow: 0 0 0 4px rgba(229,57,53,.10); } }
  .filters button.recent-active { background: #e53935; color: #fff; border-color: #e53935; }
  #sync-status { font-size: 11px; color: #4CAF50; font-weight: bold; margin-bottom: 5px; display: inline-block;}
  .offline { color: #F44336 !important; }

  /* ═══════════════════════════════════════════════
     OVERFLOW MENU (desktop)
  ═══════════════════════════════════════════════ */
  .overflow-wrap { position: relative; display: inline-block; }
  .overflow-trigger { font: inherit; font-size: 12px; padding: 5px 10px; border: 1px solid var(--ink); background: transparent; color: var(--ink); cursor: pointer; border-radius: 3px; }
  .overflow-trigger:hover { background: var(--ink); color: var(--paper); }
  .overflow-menu { display: none; position: absolute; right: 0; top: calc(100% + 4px); background: var(--paper); border: 1px solid #ccc; border-radius: 6px; min-width: 180px; z-index: 200; box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 4px; }
  .overflow-menu.open { display: block; }
  .overflow-item { display: flex; align-items: center; gap: 8px; width: 100%; font: inherit; font-size: 12px; padding: 7px 12px; border: none; background: transparent; color: var(--ink); cursor: pointer; border-radius: 4px; text-align: left; }
  .overflow-item:hover { background: var(--bg); }
  .overflow-item.danger { color: #c62828; }
  .overflow-item.danger:hover { background: #fde8e8; }

  /* ═══════════════════════════════════════════════
     MOBILE — drawer
  ═══════════════════════════════════════════════ */
  /* Nascosti di default (desktop) */
  .mobile-topbar { display: none; }
  .mb-drawer { display: none; }
  .mb-drawer-overlay { display: none; }

  @media (max-width: 680px) {
    /* Nascondi elementi desktop nella sticky */
    .sticky { padding-top: 0; padding-bottom: 0; border-bottom: none; margin-bottom: 0; }
    .top { display: none; }
    .form { display: none; }
    .recurrence { display: none; }
    .filter-row { display: none; }
    .legend-row { display: none; }
    .cat-panel { display: none !important; }
    .stats-panel { display: none !important; }
    .search-bar { display: none; }

    /* Mostra elementi mobile */
    .mb-drawer { display: block; }

    /* Barra mobile fissa */
    .mobile-topbar {
      display: block;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      border-bottom: 1px solid var(--line);
    }
    .mb-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px 8px;
    }
    .mb-title-group {}
    .mb-title { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; color: var(--ink); }
    .mb-status { font-size: 10px; color: #4CAF50; font-weight: 600; }
    .mb-month { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .mb-controls { display: flex; gap: 6px; align-items: center; }
    .mb-icon-btn {
      width: 36px; height: 36px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: var(--paper);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--ink); font-size: 18px;
      flex-shrink: 0;
    }
    .mb-icon-btn.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* Filtri orizzontali scorrevoli */
    .mb-filters {
      display: flex;
      gap: 5px;
      padding: 0 14px 8px;
      overflow-x: auto;
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }
    .mb-filters::-webkit-scrollbar { display: none; }
    .mb-filter-chip {
      flex-shrink: 0;
      font: inherit;
      font-size: 11px;
      font-weight: 500;
      padding: 4px 12px;
      border: 1px solid #ccc;
      border-radius: 20px;
      background: var(--paper);
      color: var(--muted);
      cursor: pointer;
      white-space: nowrap;
    }
    .mb-filter-chip.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .mb-filter-chip.recent-chip { border-color: #e53935; color: #e53935; }
    .mb-filter-chip.recent-chip.on { background: #e53935; color: #fff; border-color: #e53935; }

    /* Drawer overlay */
    .mb-drawer-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 90;
    }
    .mb-drawer-overlay.open { display: block; }

    /* Drawer panel */
    .mb-drawer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 95;
      background: var(--bg);
      border-top: 1px solid var(--line);
      border-radius: 14px 14px 0 0;
      padding: 14px 14px 32px;
      transform: translateY(100%);
      transition: transform 0.28s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 90vh;
      overflow-y: auto;
    }
    .mb-drawer.open { transform: translateY(0); }

    .mb-drawer-handle {
      width: 36px; height: 4px;
      background: #ccc;
      border-radius: 2px;
      margin: 0 auto 14px;
    }

    .mb-section-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 8px;
    }

    /* Form nel drawer */
    .mb-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .mb-form input, .mb-form select {
      font: inherit;
      font-size: 14px;
      padding: 9px 11px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      width: 100%;
    }
    .mb-form-row { display: flex; gap: 8px; }
    .mb-form-row input, .mb-form-row select { flex: 1; }
    .mb-save-btn {
      width: 100%;
      font: inherit;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      background: var(--ink);
      color: var(--paper);
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .mb-cancel-btn {
      width: 100%;
      font: inherit;
      font-size: 13px;
      padding: 8px;
      background: transparent;
      border: 1px solid #ccc;
      color: var(--muted);
      border-radius: 8px;
      cursor: pointer;
      margin-top: 4px;
      display: none;
    }

    /* Azioni drawer */
    .mb-drawer-sep { height: 1px; background: var(--line); margin: 14px 0; }
    .mb-actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .mb-action-btn {
      font: inherit;
      font-size: 12px;
      font-weight: 500;
      padding: 10px 12px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background: var(--paper);
      color: var(--ink);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .mb-action-btn:hover { background: var(--bg); }
    .mb-action-btn.primary { background: var(--ink); color: var(--paper); border-color: var(--ink); }
    .mb-action-btn.danger { color: #c62828; border-color: #e5a0a0; }

    /* Ricadenza nel drawer */
    .mb-recurrence { display: flex; flex-direction: column; gap: 8px; margin-bottom: 10px; }
    .mb-recurrence select { font: inherit; font-size: 13px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; background: var(--paper); color: var(--ink); }
    .mb-dow { display: flex; gap: 4px; }
    .mb-dow button { font: inherit; font-size: 12px; font-weight: 600; flex: 1; height: 34px; border: 1px solid #ccc; background: var(--paper); color: var(--muted); cursor: pointer; border-radius: 6px; padding: 0; }
    .mb-dow button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* Selezione mese nel drawer */
    .mb-month-row { display: flex; gap: 8px; }
    .mb-month-row select { flex: 1; font: inherit; font-size: 13px; padding: 8px 10px; border: 1px solid #ccc; border-radius: 8px; background: var(--paper); color: var(--ink); }

    /* Ricerca nel drawer */
    .mb-search { font: inherit; font-size: 14px; padding: 9px 14px; border: 1px solid #ccc; border-radius: 20px; background: var(--paper); width: 100%; margin-bottom: 10px; color: var(--ink); }

    /* Vista e fascia oraria nel drawer */
    .mb-toggle-group { display: flex; gap: 4px; }
    .mb-toggle-group button { font: inherit; font-size: 11px; flex: 1; padding: 7px 4px; border: 1px solid #ccc; background: var(--paper); border-radius: 6px; cursor: pointer; color: var(--muted); }
    .mb-toggle-group button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }

    /* Page padding mobile */
    .page { padding: 0 12px 60px; }
    #list { margin-top: 12px; }
  }

  @media print {
    @page { size: A4; margin: 8mm 8mm; }
    html, body { background: #fff !important; }
    .page { padding: 0; max-width: 100%; }
    .sticky { position: static; padding: 0; margin-bottom: 6px; border-bottom: none; }
    .no-print { display: none !important; }
    .mobile-topbar { display: none !important; }
    .top { padding-bottom: 4px; margin-bottom: 6px; border-bottom: 1px solid #000; }
    .list { column-count: 2; column-gap: 8mm; column-rule: 1px dotted #ccc; }
    .day { break-inside: avoid; margin-bottom: 7px; }
    .day-h { font-size: 9pt; padding: 3px 6px; margin: 6px 0 2px; border-left-width: 4px; }
    .row { grid-template-columns: 12px 32px 1fr 38px; gap: 4px; padding: 1px 5px; margin-bottom: 1px; font-size: 8.5pt; }
    .row .act { display: none; }
    .recent-dot { display: none; }
  }
</style>
</head>
<body>

<!-- ═══════════════════════════════════
     MOBILE TOPBAR (solo su mobile)
═══════════════════════════════════ -->
<div class="mobile-topbar" id="mobile-topbar">
  <div class="mb-top">
    <div class="mb-title-group">
      <div class="mb-title">Programmazione</div>
      <div id="mb-sync-status" class="mb-status">● Connessione...</div>
      <div id="mb-month-label" class="mb-month">Caricamento...</div>
    </div>
    <div class="mb-controls">
      <div class="mb-icon-btn" id="mb-search-btn" onclick="toggleMbSearch()" title="Cerca">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </div>
      <div class="mb-icon-btn" id="mb-menu-btn" onclick="toggleDrawer()" title="Menu">
        <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </div>
    </div>
  </div>
  <div class="mb-filters" id="mb-filters"></div>
</div>

<!-- Drawer overlay -->
<div class="mb-drawer-overlay" id="mb-overlay" onclick="closeDrawer()"></div>

<!-- Drawer panel -->
<div class="mb-drawer" id="mb-drawer">
  <div class="mb-drawer-handle"></div>

  <!-- Ricerca (mostrata solo quando attiva) -->
  <div id="mb-search-wrap" style="display:none;margin-bottom:10px;">
    <input class="mb-search" id="mb-search-input" placeholder="Cerca nel mese…" oninput="onMbSearch(this.value)">
  </div>

  <!-- Mese -->
  <div class="mb-section-label">Mese</div>
  <div class="mb-month-row" style="margin-bottom:14px;">
    <select id="mb-m-sel"></select>

<script>
  /* ═══════════════════════════════════════════════
     OVERFLOW MENU — desktop
  ═══════════════════════════════════════════════ */
  function toggleOverflow() {
    document.getElementById("overflow-menu").classList.toggle("open");
  }
  function closeOverflow() {
    document.getElementById("overflow-menu").classList.remove("open");
  }
  document.addEventListener("click", function(e) {
    const wrap = document.querySelector(".overflow-wrap");
    if (wrap && !wrap.contains(e.target)) closeOverflow();
  });

  /* ═══════════════════════════════════════════════
     DRAWER — mobile
  ═══════════════════════════════════════════════ */
  function toggleDrawer() {
    const drawer = document.getElementById("mb-drawer");
    const overlay = document.getElementById("mb-overlay");
    const btn = document.getElementById("mb-menu-btn");
    const isOpen = drawer.classList.contains("open");
    if (isOpen) { closeDrawer(); } else {
      drawer.classList.add("open");
      overlay.classList.add("open");
      btn.classList.add("active");
      document.body.style.overflow = "hidden";
    }
  }
  function closeDrawer() {
    document.getElementById("mb-drawer").classList.remove("open");
    document.getElementById("mb-overlay").classList.remove("open");
    document.getElementById("mb-menu-btn").classList.remove("active");
    document.body.style.overflow = "";
  }
  function toggleMbSearch() {
    const wrap = document.getElementById("mb-search-wrap");
    const btn = document.getElementById("mb-search-btn");
    const isVisible = wrap.style.display !== "none";
    if (isVisible) {
      wrap.style.display = "none";
      btn.classList.remove("active");
    } else {
      wrap.style.display = "block";
      btn.classList.add("active");
      document.getElementById("mb-search-input").focus();
    }
  }
  function onMbSearch(val) {
    // Sincronizza col search desktop (che triggera il render)
    document.getElementById("f-search").value = val;
    document.getElementById("f-search").dispatchEvent(new Event("input"));
  }
  function syncMbViewBtns() {
    ["list","grid"].forEach(v => {
      const b = document.getElementById("mb-vm-" + v);
      const bD = document.getElementById("vm-" + v);
      if (b) b.className = bD && bD.className === "on" ? "on" : "";
    });
  }
  function syncMbTimeBtns() {
    ["all","morning","afternoon","evening"].forEach(t => {
      const b = document.getElementById("mb-tf-" + t);
      const bD = document.getElementById("tf-" + t);
      if (b) b.className = bD && bD.className === "on" ? "on" : "";
    });
  }

  /* Sincronizzazione selettori mese mobile ↔ desktop */
  const MONTHS_IT = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  const mbMSel = document.getElementById("mb-m-sel");
  const mbYSel = document.getElementById("mb-y-sel");
  const today2 = new Date();
  MONTHS_IT.forEach((n,i) => mbMSel.appendChild(new Option(n,i)));
  for (let y = today2.getFullYear()-5; y <= today2.getFullYear()+10; y++) mbYSel.appendChild(new Option(y,y));
  mbMSel.value = today2.getMonth();
  mbYSel.value = today2.getFullYear();

  mbMSel.addEventListener("change", () => {
    document.getElementById("m-sel").value = mbMSel.value;
    document.getElementById("m-sel").dispatchEvent(new Event("change"));
  });
  mbYSel.addEventListener("change", () => {
    document.getElementById("y-sel").value = mbYSel.value;
    document.getElementById("y-sel").dispatchEvent(new Event("change"));
  });

  /* Mantieni selettori mobile sincronizzati quando cambia da desktop */
  const origMSel = document.getElementById("m-sel");
  const origYSel = document.getElementById("y-sel");
  if (origMSel) origMSel.addEventListener("change", () => { mbMSel.value = origMSel.value; });
  if (origYSel) origYSel.addEventListener("change", () => { mbYSel.value = origYSel.value; });

  /* ─── Form mobile ─── */
  let mbEditingId = null;

  function mbSyncCatSelect() {
    const desktop = document.getElementById("f-cat");
    const mobile  = document.getElementById("mb-f-cat");
    mobile.innerHTML = "";
    Array.from(desktop.options).forEach(o => mobile.appendChild(new Option(o.text, o.value)));
  }

  window.mbSubmitForm = function() {
    // Copia i valori nel form desktop e chiama submitForm()
    document.getElementById("f-cat").value   = document.getElementById("mb-f-cat").value;
    document.getElementById("f-date").value  = document.getElementById("mb-f-date").value;
    document.getElementById("f-time").value  = document.getElementById("mb-f-time").value;
    document.getElementById("f-name").value  = document.getElementById("mb-f-name").value;
    document.getElementById("f-dur-h").value = document.getElementById("mb-f-dur-h").value;
    document.getElementById("f-dur-m").value = document.getElementById("mb-f-dur-m").value;
    document.getElementById("f-preset").value= document.getElementById("mb-f-preset").value;
    // Sincronizza DOW
    document.querySelectorAll("#mb-f-dow button").forEach(mbBtn => {
      const desktopBtn = document.querySelector("#f-dow button[data-dow='" + mbBtn.dataset.dow + "']");
      if (desktopBtn) {
        desktopBtn.classList.toggle("on", mbBtn.classList.contains("on"));
      }
    });
    window.submitForm().then(() => {
      mbResetForm();
      closeDrawer();
    });
  };

  window.mbResetForm = function() {
    mbEditingId = null;
    document.getElementById("mb-f-date").value = "";
    document.getElementById("mb-f-time").value = "";
    document.getElementById("mb-f-name").value = "";
    document.getElementById("mb-f-dur-h").value = "";
    document.getElementById("mb-f-dur-m").value = "";
    document.getElementById("mb-f-preset").value = "single";
    document.querySelectorAll("#mb-f-dow button").forEach(b => b.classList.remove("on"));
    document.getElementById("mb-f-go").textContent = "Salva programma";
    document.getElementById("mb-f-cancel").style.display = "none";
    document.getElementById("mb-form-label").textContent = "Aggiungi programma";
  };

  /* Preset DOW mobile */
  const MB_PRESETS = { single: [], every: [1,2,3,4,5,6,0], no_sun: [1,2,3,4,5,6], weekdays: [1,2,3,4,5] };
  function mbSetSelectedDows(dows) {
    document.querySelectorAll("#mb-f-dow button").forEach(b => b.classList.toggle("on", dows.includes(parseInt(b.dataset.dow,10))));
  }
  document.querySelectorAll("#mb-f-dow button").forEach(btn => {
    btn.addEventListener("click", () => { btn.classList.toggle("on"); document.getElementById("mb-f-preset").value = "custom"; });
  });
  document.getElementById("mb-f-preset").addEventListener("change", (e) => {
    const p = e.target.value;
    if (p === "same_dow") { const dt = document.getElementById("mb-f-date").value; mbSetSelectedDows(dt ? [new Date(dt).getDay()] : []); }
    else if (MB_PRESETS[p]) mbSetSelectedDows(MB_PRESETS[p]);
  });

  /* Intercetta editEvent per popolare anche il form mobile */
  const _origEditEvent = window.editEvent;
  // verrà rimpiazzata dopo il caricamento del modulo Firebase (vedi sotto)
  function patchMobileEdit() {
    const originalEdit = window.editEvent;
    window.editEvent = function(id) {
      originalEdit(id);
      // Copia i valori nel form mobile
      setTimeout(() => {
        document.getElementById("mb-f-cat").value   = document.getElementById("f-cat").value;
        document.getElementById("mb-f-date").value  = document.getElementById("f-date").value;
        document.getElementById("mb-f-time").value  = document.getElementById("f-time").value;
        document.getElementById("mb-f-name").value  = document.getElementById("f-name").value;
        document.getElementById("mb-f-dur-h").value = document.getElementById("f-dur-h").value;
        document.getElementById("mb-f-dur-m").value = document.getElementById("f-dur-m").value;
        document.getElementById("mb-f-go").textContent = "Aggiorna";
        document.getElementById("mb-f-cancel").style.display = "block";
        document.getElementById("mb-form-label").textContent = "Modifica programma";
        toggleDrawer();
      }, 50);
    };
  }

  /* Aggiorna label mese nella topbar mobile */
  function updateMbMonthLabel(text) {
    document.getElementById("mb-month-label").textContent = text;
    const parts = text.match(/(\d+)$/);
    // Sync selettori se presenti
  }

  /* Aggiorna filtri mobile */
  function renderMbFilters(inView, CATEGORIES, filter, filterRecent, recentCount) {
    const container = document.getElementById("mb-filters");
    container.innerHTML = "";

    const counts = { tutte: inView.length };
    Object.keys(CATEGORIES).forEach(k => counts[k] = 0);
    inView.forEach(e => { const k = CATEGORIES[e.category] ? e.category : "nessuna"; counts[k]++; });

    const allChip = document.createElement("button");
    allChip.className = "mb-filter-chip" + (filter === "tutte" && !filterRecent ? " on" : "");
    allChip.textContent = "Tutte (" + counts.tutte + ")";
    allChip.onclick = () => { window._setFilter("tutte"); };
    container.appendChild(allChip);

    Object.entries(CATEGORIES).forEach(([k, c]) => {
      const chip = document.createElement("button");
      chip.className = "mb-filter-chip" + (filter === k && !filterRecent ? " on" : "");
      chip.textContent = c.label + " (" + (counts[k] || 0) + ")";
      if (filter !== k || filterRecent) chip.style.borderColor = c.color;
      chip.onclick = () => { window._setFilter(k); };
      container.appendChild(chip);
    });

    if (recentCount > 0 || filterRecent) {
      const rChip = document.createElement("button");
      rChip.className = "mb-filter-chip recent-chip" + (filterRecent ? " on" : "");
      rChip.textContent = "🔴 Recenti (" + recentCount + ")";
      rChip.onclick = () => { window._toggleFilterRecent(); };
      container.appendChild(rChip);
    }
  }

  window._renderMbFilters = renderMbFilters;
</script>

    authDomain: "programmazione-d1934.firebaseapp.com",
    databaseURL: "https://programmazione-d1934-default-rtdb.firebaseio.com",

  const app = initializeApp(firebaseConfig);

  let events = [];
  let CATEGORIES = {
    prime_visioni: { label: "Prime Visioni", color: "#F9A825" },
    nuovi_film:    { label: "Nuovi Film",    color: "#1976D2" },
    serie_tv:      { label: "Serie TV",      color: "#7B1FA2" },
    western:       { label: "Western",       color: "#8D6E63" },
    nessuna:       { label: "Nessuna",       color: "#BDBDBD" },
    film:          { label: "Film",          color: "#419636" }
  };

  let editingId = null;
  let filter = "tutte";
  let searchQuery = "";
  let timeRange = "all";
  let viewMode = "list";
  let statsOpen = false;
  let isFirstLoad = true;
  let filterRecent = false;
  const RECENT_MS = 48 * 60 * 60 * 1000;

  const DAYS_SHORT = ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"];
  const DAYS_LONG  = ["Domenica","Lunedì","Martedì","Mercoledì","Giovedì","Venerdì","Sabato"];
  const MONTHS     = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];

  const TIME_RANGES = {
    all:       { fn: () => true },
    morning:   { fn: t => { const m = timeToMin(t); return m >= 360 && m < 780; } },
    afternoon: { fn: t => { const m = timeToMin(t); return m >= 780 && m < 1200; } },
    evening:   { fn: t => { const m = timeToMin(t); return m >= 1200 || m < 360; } }
  };

  const today = new Date();
  let viewYear = today.getFullYear();
  let viewMonth = today.getMonth();

  const mSel = document.getElementById("m-sel");
  const ySel = document.getElementById("y-sel");
  MONTHS.forEach((name, i) => { mSel.appendChild(new Option(name, i)); });
  for (let y = viewYear - 5; y <= viewYear + 10; y++) { ySel.appendChild(new Option(y, y)); }
  mSel.value = viewMonth;
  ySel.value = viewYear;
  mSel.addEventListener("change", () => { viewMonth = parseInt(mSel.value, 10); render(); });
  ySel.addEventListener("change", () => { viewYear  = parseInt(ySel.value, 10); render(); });

  // Esponi setter filtri per mobile
  window._setFilter = function(f) { filter = f; filterRecent = false; render(); };
  window._toggleFilterRecent = function() { filterRecent = !filterRecent; filter = "tutte"; render(); };

  function isRecentlyModified(ev) {
    if (!ev.updatedAt) return false;
    return (Date.now() - ev.updatedAt) < RECENT_MS;
  }

  onSnapshot(doc(db, "config", "categories"), (docSnap) => {
    if (docSnap.exists() && Object.keys(docSnap.data()).length > 0) {
      CATEGORIES = docSnap.data();
    } else {
      setDoc(doc(db, "config", "categories"), CATEGORIES);
    }
    rebuildCatSelect();
    renderCatPanel();
    render();
  }, (error) => { console.error("Errore lettura categorie:", error); });

  onSnapshot(collection(db, "events"), (snapshot) => {
    const statusEl = document.getElementById("sync-status");
    const mbStatusEl = document.getElementById("mb-sync-status");
    statusEl.textContent = "● Sincronizzato";
    statusEl.className = "";
    if (mbStatusEl) { mbStatusEl.textContent = "● Sincronizzato"; mbStatusEl.className = "mb-status"; }
    events = [];
    snapshot.forEach(doc => { events.push(doc.data()); });
    if (isFirstLoad && events.length > 0) {
      isFirstLoad = false;
      const first = events.map(e => e.date).sort()[0];
      if (first) {
        const [yy, mm] = first.split("-").map(Number);
        viewYear = yy; viewMonth = mm - 1;
        mSel.value = viewMonth; ySel.value = viewYear;
        const mbM = document.getElementById("mb-m-sel");
        const mbY = document.getElementById("mb-y-sel");
        if (mbM) mbM.value = viewMonth;
        if (mbY) mbY.value = viewYear;
      }
    }
    render();
  }, (error) => {
    const statusEl = document.getElementById("sync-status");

  function parseDuration(str) {
    if (!str) return { h: 0, m: 0 };
    const s = String(str).trim().toLowerCase();
    let h = 0, m = 0;
    const hMatch = s.match(/(\d+)\s*h/);
    const mMatch = s.match(/(\d+)\s*(?:m|min|')/);
    if (hMatch) h = parseInt(hMatch[1], 10) || 0;
    if (mMatch) m = parseInt(mMatch[1], 10) || 0;
    if (!hMatch && !mMatch) { const onlyNum = s.match(/^(\d+)$/); if (onlyNum) m = parseInt(onlyNum[1], 10) || 0; }
    return { h, m };
  }

  function formatDuration(h, m) {
    h = parseInt(h, 10) || 0; m = parseInt(m, 10) || 0;
    if (h <= 0 && m <= 0) return "";
    if (h > 0 && m > 0) return h + "h" + String(m).padStart(2, "0") + "m";
    if (h > 0) return h + "h";
    return m + "m";
  }

  function timeToMin(t) {
    if (!t) return -1;
    const parts = t.split(":");
    return parseInt(parts[0], 10) * 60 + (parseInt(parts[1], 10) || 0);
  }

  function isLightColor(hex) {
    const c = String(hex).replace("#", "");
    const r = parseInt(c.substr(0, 2), 16), g = parseInt(c.substr(2, 2), 16), b = parseInt(c.substr(4, 2), 16);
    return ((0.299 * r + 0.587 * g + 0.114 * b) / 255) > 0.65;
  }

  function eventsInView() {
    const ymPrefix = viewYear + "-" + String(viewMonth + 1).padStart(2, "0");
    return events.filter(e => e.date && e.date.startsWith(ymPrefix));
  }

    const mbY = document.getElementById("mb-y-sel");
    if (mbM) mbM.value = viewMonth;

    const recentCount = inView.filter(isRecentlyModified).length;

      (recentCount > 0 ? " • 🔴 " + recentCount + " recenti" : "");

    // Filtri desktop

    filtersDiv.innerHTML = "";
    const counts = { tutte: inView.length };
    Object.keys(CATEGORIES).forEach(k => counts[k] = 0);
    inView.forEach(e => { const k = CATEGORIES[e.category] ? e.category : "nessuna"; counts[k]++; });

    const allBtn = document.createElement("button");
    allBtn.className = filter === "tutte" && !filterRecent ? "on" : "";
    allBtn.textContent = "Tutte (" + counts.tutte + ")";
    allBtn.onclick = () => { filter = "tutte"; filterRecent = false; render(); };
    filtersDiv.appendChild(allBtn);

    Object.entries(CATEGORIES).forEach(([k, c]) => {
      const b = document.createElement("button");
      b.className = filter === k && !filterRecent ? "on" : "";
      b.textContent = c.label + " (" + (counts[k] || 0) + ")";

    }

    let filtered = filter === "tutte" ? inView : inView.filter(e => (CATEGORIES[e.category] ? e.category : "nessuna") === filter);
    if (filterRecent) filtered = filtered.filter(isRecentlyModified);

    const sq = (searchQuery || "").trim().toLowerCase();

    if (timeRange !== "all") filtered = filtered.filter(e => TIME_RANGES[timeRange].fn(e.time));

    ["all","morning","afternoon","evening"].forEach(tr => {

    ["list","grid"].forEach(vm => {

      it.appendChild(sw); it.appendChild(document.createTextNode(c.label));
      legend.appendChild(it);
    });

    if (viewMode === "grid") { renderGrid(filtered); return; }

    const groups = {};
    filtered.forEach(e => { if (!groups[e.date]) groups[e.date] = []; groups[e.date].push(e); });
    Object.values(groups).forEach(arr => arr.sort((a, b) => a.time.localeCompare(b.time)));

    const list = document.getElementById("list");
    list.innerHTML = "";
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = viewYear + "-" + String(viewMonth + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
      const items = groups[dateKey] || [];
      const dt = new Date(viewYear, viewMonth, d);
      const dayName = DAYS_LONG[dt.getDay()];
      const dateLabel = dayName + " " + String(d).padStart(2, "0") + "/" + String(viewMonth + 1).padStart(2, "0") + "/" + viewYear;

      const dayDiv = document.createElement("div");
      dayDiv.className = "day" + (items.length === 0 ? " empty-day" : "");

      const overlapIds = new Set();
      for (let i = 0; i < items.length - 1; i++) {
        const { h: dh, m: dm } = parseDuration(items[i].duration);
        const aEnd = timeToMin(items[i].time) + dh * 60 + dm;
        const bStart = timeToMin(items[i + 1].time);
        if (aEnd > 0 && bStart >= 0 && aEnd > bStart) { overlapIds.add(items[i].id); overlapIds.add(items[i + 1].id); }
      }

      items.forEach(ev => {
        const catKey = CATEGORIES[ev.category] ? ev.category : "nessuna";

        row.appendChild(chip);

        t.className = "t"; t.textContent = ev.time;
        row.appendChild(t);

        n.className = "n";

        nameSpan.textContent = ev.name;
        n.appendChild(nameSpan);

          dot.title = "Modificato " + (hoursAgo < 1 ? "meno di 1 ora fa" : hoursAgo + "h fa");
          n.appendChild(dot);

        if (overlapIds.has(ev.id)) {
          const badge = document.createElement("span");
          badge.className = "overlap-badge no-print"; badge.textContent = "⚠ sovrapposizione";
          n.appendChild(badge);

        du.className = "d"; du.textContent = ev.duration || "";
        row.appendChild(du);

        const act = document.createElement("div");
        act.className = "act no-print";
        const editBtn = document.createElement("button"); editBtn.textContent = "✎"; editBtn.onclick = () => window.editEvent(ev.id);
        const delBtn  = document.createElement("button"); delBtn.textContent  = "×"; delBtn.className = "del"; delBtn.onclick = () => window.deleteEvent(ev.id);
        act.appendChild(editBtn); act.appendChild(delBtn);

      });

  function renderGrid(filtered) {
    const list = document.getElementById("list");
    list.innerHTML = "";
    const groups = {};
    filtered.forEach(e => { if (!groups[e.date]) groups[e.date] = []; groups[e.date].push(e); });
    Object.values(groups).forEach(arr => arr.sort((a, b) => a.time.localeCompare(b.time)));

    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
    let hasAny = false;
    for (let d = 1; d <= daysInMonth; d++) {
      const dateKey = viewYear + "-" + String(viewMonth + 1).padStart(2, "0") + "-" + String(d).padStart(2, "0");
      const items = groups[dateKey] || [];
      if (items.length === 0) continue;
      hasAny = true;
      const dt = new Date(viewYear, viewMonth, d);
      const dayDiv = document.createElement("div");
      dayDiv.className = "grid-day";
      const header = document.createElement("div");
      header.className = "grid-day-header";
      header.textContent = DAYS_SHORT[dt.getDay()] + " " + String(d).padStart(2, "0") + "/" + String(viewMonth + 1).padStart(2, "0");
      dayDiv.appendChild(header);

      const timeline = document.createElement("div");
      timeline.className = "grid-timeline";
      [0, 4, 8, 12, 16, 20].forEach(h => {
        const tick = document.createElement("div"); tick.className = "grid-tick"; tick.style.left = (h / 24 * 100) + "%";
        timeline.appendChild(tick);
      });

      items.forEach(ev => {
        const startMin = timeToMin(ev.time);
        if (startMin < 0) return;
        const { h, m } = parseDuration(ev.duration);
        const durMin = h * 60 + m;
        const block = document.createElement("div");
        block.className = "grid-block";
        const catKey = CATEGORIES[ev.category] ? ev.category : "nessuna";
        const cat = CATEGORIES[catKey] || { color: "#ccc" };
        block.style.background = cat.color;
        block.style.left  = (startMin / 1440 * 100) + "%";
        block.style.width = Math.max(durMin > 0 ? durMin / 1440 * 100 : 0.4, 0.4) + "%";
        block.style.color = isLightColor(cat.color) ? "#111" : "#fff";
        block.textContent = ev.name;
        block.title = ev.time + " — " + ev.name + (ev.duration ? " (" + ev.duration + ")" : "") + (isRecentlyModified(ev) ? " 🔴 modificato di recente" : "");
        if (isRecentlyModified(ev)) block.style.outline = "2px solid #e53935";
        timeline.appendChild(block);
      });
      dayDiv.appendChild(timeline);
      list.appendChild(dayDiv);
    }
    if (!hasAny) list.innerHTML = '<div class="empty">Nessun programma trovato.</div>';
  }

  function renderStats() {
    const panel = document.getElementById("stats-panel");
    const inView = eventsInView();
    let totalMin = 0;
    inView.forEach(e => { const { h, m } = parseDuration(e.duration); totalMin += h * 60 + m; });
    const totalH = Math.floor(totalMin / 60); const totalM = totalMin % 60;
    const catMin = {};
    Object.keys(CATEGORIES).forEach(k => catMin[k] = 0);
    inView.forEach(e => { const k = CATEGORIES[e.category] ? e.category : "nessuna"; const { h, m } = parseDuration(e.duration); catMin[k] = (catMin[k] || 0) + h * 60 + m; });

    let html = '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">';
    html += '<span style="font-weight:700;color:var(--muted);text-transform:uppercase;">Statistiche — ' + MONTHS[viewMonth] + ' ' + viewYear + '</span>';
    html += '<button onclick="window.toggleStats()" style="font:inherit;font-size:11px;padding:2px 8px;border:1px solid #ccc;background:transparent;">Chiudi ×</button></div>';
    html += '<div class="stats-grid">';
    html += '<div class="stats-card"><div class="val">' + inView.length + '</div><div class="lbl">Programmi nel mese</div></div>';
    html += '<div class="stats-card"><div class="val">' + totalH + 'h' + (totalM > 0 ? ' ' + totalM + 'm' : '') + '</div><div class="lbl">Ore programmate</div></div>';
    const recentCount = inView.filter(isRecentlyModified).length;
    html += '<div class="stats-card"><div class="val" style="color:#e53935">' + recentCount + '</div><div class="lbl">Modificati ultime 48h</div></div>';
    html += '</div>';

    const maxMin = Math.max(...Object.values(catMin).filter(v => v > 0), 1);
    Object.entries(CATEGORIES).sort((a, b) => (catMin[b[0]] || 0) - (catMin[a[0]] || 0)).forEach(([k, c]) => {
      const min = catMin[k] || 0;
      const ch = Math.floor(min / 60); const cm = min % 60;
      const pct = (min / maxMin * 100).toFixed(0);
      const lbl = ch > 0 ? ch + "h" + (cm > 0 ? " " + cm + "m" : "") : (cm > 0 ? cm + "m" : "—");
      html += '<div class="stats-cat-bar">';
      html += '<span style="width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + c.label + '</span>';
      html += '<div class="stats-bar-bg"><div class="stats-bar-fill" style="width:' + pct + '%;background:' + c.color + '"></div></div>';
      html += '<span style="width:55px;text-align:right;">' + lbl + '</span></div>';
    });
    panel.innerHTML = html;
  }

  window.submitForm = async function() {
    const date     = document.getElementById("f-date").value;
    const time     = document.getElementById("f-time").value;
    const name     = document.getElementById("f-name").value.trim();
    const dh       = document.getElementById("f-dur-h").value;
    const dm       = document.getElementById("f-dur-m").value;
    const duration = formatDuration(dh, dm);
    const category = document.getElementById("f-cat").value;

    if (!date || !time || !name) return alert("Compila almeno data, orario e nome.");

    const selectedDows = getSelectedDows();
    const [yy, mm, dd] = date.split("-").map(Number);
    const batch = writeBatch(db);
    const isEdit = !!editingId;

    if (editingId) batch.delete(doc(db, "events", editingId));

    if (selectedDows.length === 0) {
      const eId = editingId || ("e" + Date.now() + Math.random().toString(36).slice(2, 5));
      const evData = { id: eId, date, time, name, duration, category };
      if (isEdit) evData.updatedAt = Date.now();
      batch.set(doc(db, "events", eId), evData);
    } else {
      const daysInMonth = new Date(yy, mm, 0).getDate();
      for (let d = dd; d <= daysInMonth; d++) {
        const dt = new Date(yy, mm - 1, d);
        if (!selectedDows.includes(dt.getDay())) continue;
        const isoDate = yy + "-" + String(mm).padStart(2, "0") + "-" + String(d).padStart(2, "0");
        const eId = "e" + Date.now() + Math.random().toString(36).slice(2, 5) + "_" + d;
        const evData = { id: eId, date: isoDate, time, name, duration, category };
        if (isEdit) evData.updatedAt = Date.now();
        batch.set(doc(db, "events", eId), evData);
      }
    }

    await batch.commit();
    viewYear = yy; viewMonth = mm - 1;
    window.resetForm();
  };

  window.copyToNextMonth = async function() {
    const evts = eventsInView();
    if (evts.length === 0) return alert("Nessun programma nel mese corrente da copiare.");
    const nextMonth = viewMonth === 11 ? 0 : viewMonth + 1;
    const nextYear  = viewMonth === 11 ? viewYear + 1 : viewYear;
    const nextPrefix = nextYear + "-" + String(nextMonth + 1).padStart(2, "0");
    const existing   = events.filter(e => e.date && e.date.startsWith(nextPrefix));
    const batch = writeBatch(db);
    let copied = 0, skipped = 0;
    const daysInNext = new Date(nextYear, nextMonth + 1, 0).getDate();
    function weekOccurrence(y, m, d) {
      const wd = new Date(y, m - 1, d).getDay();
      let first = 1; while (new Date(y, m - 1, first).getDay() !== wd) first++;
      return Math.round((d - first) / 7) + 1;
    }
    evts.forEach(ev => {
      const [yy, mm, dd] = ev.date.split("-").map(Number);
      const wd  = new Date(yy, mm - 1, dd).getDay();
      const occ = weekOccurrence(yy, mm, dd);
      let count = 0, targetDay = null;
      for (let d = 1; d <= daysInNext; d++) {
        if (new Date(nextYear, nextMonth, d).getDay() === wd) { count++; if (count === occ) { targetDay = d; break; } }
      }
      if (!targetDay) { skipped++; return; }
      const targetDate = nextYear + "-" + String(nextMonth + 1).padStart(2, "0") + "-" + String(targetDay).padStart(2, "0");
      if (existing.some(e => e.date === targetDate && e.time === ev.time && e.name === ev.name)) { skipped++; return; }
      const eId = "e" + Date.now() + Math.random().toString(36).slice(2, 5) + "_cp" + targetDay;
      batch.set(doc(db, "events", eId), { id: eId, date: targetDate, time: ev.time, name: ev.name, duration: ev.duration, category: ev.category });
      copied++;
    });
    if (copied > 0) { await batch.commit(); viewYear = nextYear; viewMonth = nextMonth; alert(copied + " programmi copiati in " + MONTHS[nextMonth] + " " + nextYear + "."); }
    else alert("Nessun programma copiato.");
  };

    else { panel.style.display = "block"; renderCatPanel(); }
  };

  window.toggleStats   = function() { statsOpen = !statsOpen; document.getElementById("stats-panel").style.display = statsOpen ? "block" : "none"; if (statsOpen) renderStats(); };
  window.setTimeRange  = function(tr) { timeRange = tr; render(); };
  window.setViewMode   = function(vm) { viewMode  = vm; render(); };
  window.printPDF      = function() { window.print(); };

  document.getElementById("f-search").addEventListener("input", (e) => { searchQuery = e.target.value; render(); });
  ["f-name","f-dur-h","f-dur-m"].forEach(id => { document.getElementById(id).addEventListener("keydown", (e) => { if (e.key === "Enter") window.submitForm(); }); });
  ["mb-f-name","mb-f-dur-h","mb-f-dur-m"].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.addEventListener("keydown", (e) => { if (e.key === "Enter") window.mbSubmitForm(); });
  });

  const PRESETS = { single: [], every: [1,2,3,4,5,6,0], no_sun: [1,2,3,4,5,6], weekdays: [1,2,3,4,5] };
  function getSelectedDows() { return Array.from(document.querySelectorAll("#f-dow button.on")).map(b => parseInt(b.dataset.dow, 10)); }
  function setSelectedDows(dows) {
    document.querySelectorAll("#f-dow button").forEach(b => b.classList.toggle("on", dows.includes(parseInt(b.dataset.dow, 10))));
    const names = [1,2,3,4,5,6,0].filter(d => dows.includes(d)).map(d => DAYS_SHORT[d]);
    document.getElementById("f-hint").textContent = dows.length === 0 ? "Solo questo giorno" : (dows.length === 7 ? "Tutti i giorni del mese" : "Ogni " + names.join(", ") + " dal giorno scelto");
  }
  document.querySelectorAll("#f-dow button").forEach(btn => {
    btn.addEventListener("click", () => { btn.classList.toggle("on"); document.getElementById("f-preset").value = "custom"; setSelectedDows(getSelectedDows()); });
  });
  document.getElementById("f-preset").addEventListener("change", (e) => {
    const p = e.target.value;
    if (p === "same_dow") { const dt = document.getElementById("f-date").value; setSelectedDows(dt ? [new Date(dt).getDay()] : []); }
    else if (PRESETS[p]) setSelectedDows(PRESETS[p]);
  });

  window.downloadBackup = function() {
    const data = { events, categories: CATEGORIES };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "backup_programmazione_" + new Date().toISOString().slice(0,10) + ".json";
    a.click();
  };

  window.exportCSV = function() {
    const inView = eventsInView();
    if (inView.length === 0) return alert("Nessun programma.");
    const rows = [["Data","Giorno","Orario","Nome programma","Durata","Categoria","Modificato di recente"]];
    inView.sort((a, b) => a.date.localeCompare(b.date) || a.time.localeCompare(b.time)).forEach(e => {
      const [yy, mm, dd] = e.date.split("-");
      rows.push([dd+"/"+mm+"/"+yy, DAYS_LONG[new Date(e.date).getDay()], e.time, e.name, e.duration || "", (CATEGORIES[e.category]||{label:"Nessuna"}).label, isRecentlyModified(e) ? "Sì" : ""]);
    });
    const csv = rows.map(r => r.map(v => '"' + String(v).replace(/"/g, '""') + '"').join(",")).join("\r\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8" }));
    a.download = "programmazione_" + MONTHS[viewMonth] + "_" + viewYear + ".csv";
    a.click();
  };

  window.triggerImport = function() { document.getElementById("f-import").click(); };
  document.getElementById("f-import").addEventListener("change", function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = async function(ev) {
      try {
        let importedEvents = [];
        if (file.name.endsWith(".json")) {
          const parsed = JSON.parse(ev.target.result);
          importedEvents = parsed.events || parsed;
        } else {
          const match = ev.target.result.match(/<script[^>]*id="events-data"[^>]*>([\s\S]*?)<\/script>/);
          if (!match) return alert("Nessun dato trovato nel file HTML.");
          importedEvents = JSON.parse(match[1].trim());
        }
        if (!confirm("Trovati " + importedEvents.length + " eventi nel file. Procedo all'importazione?")) return;
        const statusEl = document.getElementById("sync-status");
        statusEl.textContent = "Sincronizzazione massiva in corso...";
        let batch = writeBatch(db); let count = 0;
        for (let i = 0; i < importedEvents.length; i++) {
          const evData = importedEvents[i];
          batch.set(doc(db, "events", evData.id), evData);
          count++;
          if (count === 490) { await batch.commit(); batch = writeBatch(db); count = 0; }
        }
        if (count > 0) await batch.commit();
        alert("Importazione completata!");
      } catch (err) { alert("Errore importazione: " + err.message); }
    };
    reader.readAsText(file);
    this.value = "";
  });
</script>
</body>
</html>
